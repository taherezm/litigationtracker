name: Litigation Tracker — Scheduled Update

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scheduled_update.yml'
      - 'requirements.txt'
      - 'scripts/**'
      - 'tests/**'
  schedule:
    - cron: '17 13 */5 * *'
  workflow_dispatch:

concurrency:
  group: litigation-tracker-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MAX_DOCKET_UPDATE_PASSES: 2
      MAX_SUMMARIES_PER_RUN: 100

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Docket updates run before discovery so tracked cases get first claim on the
      # CourtListener request quota; newly discovered cases backfill on the next run.
      - name: Update dockets and summarize entries
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEGAL_AI_MODEL: ${{ secrets.LEGAL_AI_MODEL }}
        run: python scripts/run_docket_update_passes.py

      - name: Discover new cases
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEGAL_AI_MODEL: ${{ secrets.LEGAL_AI_MODEL }}
        run: python scripts/discover_cases.py

      - name: Enrich complaint source documents
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          MAX_SOURCE_DOCUMENT_CASES_PER_RUN: 8
          MAX_SOURCE_DOCUMENTS_PER_CASE: 2
        run: python scripts/enrich_case_sources.py

      - name: Validate tracker data
        run: python scripts/validate_tracker_data.py

      - name: Commit data to pipeline repo
        run: |
          git config user.name "Litigation Tracker Bot"
          git config user.email "bot@iuiptechlaw.org"
          git add data/
          if git diff --staged --quiet; then
            git pull --ff-only origin main
          else
            git commit -m "Data update: $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Checkout site repo
        uses: actions/checkout@v6
        with:
          repository: taherezm/undergradtechlaw
          token: ${{ secrets.IPTL_SITE_TOKEN }}
          path: iptl-iu-site

      - name: Validate site tracker renderer
        run: python scripts/validate_site_renderer.py iptl-iu-site/tools/litigation-tracker/index.html

      - name: Copy data files to site repo
        run: |
          mkdir -p iptl-iu-site/tools/litigation-tracker
          cp data/cases.json iptl-iu-site/tools/litigation-tracker/cases.json
          cp data/updates.json iptl-iu-site/tools/litigation-tracker/updates.json

      - name: Push data to site repo
        working-directory: iptl-iu-site
        run: |
          git config user.name "Litigation Tracker Bot"
          git config user.email "bot@iuiptechlaw.org"
          git add tools/litigation-tracker/cases.json tools/litigation-tracker/updates.json
          if git diff --staged --quiet; then
            git pull --ff-only origin main
          else
            git commit -m "Tracker data update: $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
