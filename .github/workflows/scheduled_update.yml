name: Litigation Tracker — Scheduled Update

on:
  schedule:
    # Docket polling and discovery use separate rolling-hour quota windows.
    - cron: '17 13 * * *'
    - cron: '47 18 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: Pipeline phase to run
        required: true
        type: choice
        options:
          - dockets
          - discovery

concurrency:
  group: litigation-tracker-update
  queue: max

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MAX_DOCKET_UPDATE_PASSES: 2
      MAX_SUMMARIES_PER_RUN: 100
      # Optional repository variables. Unset values use the conservative
      # authenticated-tier defaults in scripts/cl_client.py.
      CL_REQUESTS_PER_MINUTE: ${{ vars.CL_REQUESTS_PER_MINUTE }}
      CL_REQUESTS_PER_HOUR: ${{ vars.CL_REQUESTS_PER_HOUR }}
      CL_REQUESTS_PER_DAY: ${{ vars.CL_REQUESTS_PER_DAY }}
      # Per-process wall-clock budget for CourtListener waits (seconds).
      CL_TIME_BUDGET_SECONDS: 1500
      # Keep disabled: RECAP search indexing can lag or omit documentless
      # activity. Enable only after an observe-only comparison with full polls.
      CL_BATCHED_CHANGE_DETECTION: 0

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -v

      - name: Update dockets and summarize entries
        if: github.event.schedule == '17 13 * * *' || inputs.phase == 'dockets'
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEGAL_AI_MODEL: ${{ secrets.LEGAL_AI_MODEL }}
        run: python scripts/run_docket_update_passes.py

      - name: Discover new cases
        if: github.event.schedule == '47 18 * * *' || inputs.phase == 'discovery'
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEGAL_AI_MODEL: ${{ secrets.LEGAL_AI_MODEL }}
          RESET_COURTLISTENER_RATE_LIMIT_STATE: 'true'
        run: python scripts/discover_cases.py

      - name: Validate tracker data
        run: python scripts/validate_tracker_data.py

      - name: Commit data to pipeline repo
        run: |
          git config user.name "Litigation Tracker Bot"
          git config user.email "bot@iuiptechlaw.org"
          git add data/
          if git diff --staged --quiet; then
            git pull --ff-only origin main
          else
            git commit -m "Data update: $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Checkout site repo
        uses: actions/checkout@v6
        with:
          repository: taherezm/undergradtechlaw
          token: ${{ secrets.IPTL_SITE_TOKEN }}
          path: iptl-iu-site

      - name: Validate site tracker renderer
        run: python scripts/validate_site_renderer.py iptl-iu-site/tools/litigation-tracker/index.html

      - name: Copy data files to site repo
        run: |
          mkdir -p iptl-iu-site/tools/litigation-tracker
          cp data/cases.json iptl-iu-site/tools/litigation-tracker/cases.json
          cp data/updates.json iptl-iu-site/tools/litigation-tracker/updates.json

      - name: Push data to site repo
        working-directory: iptl-iu-site
        run: |
          git config user.name "Litigation Tracker Bot"
          git config user.email "bot@iuiptechlaw.org"
          git add tools/litigation-tracker/cases.json tools/litigation-tracker/updates.json
          if git diff --staged --quiet; then
            git pull --ff-only origin main
          else
            git commit -m "Tracker data update: $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # Publish valid partial progress first, then make persistent discovery
      # staleness visible as a failed workflow instead of discarding the cursor.
      - name: Enforce pipeline freshness
        run: python scripts/validate_tracker_data.py --enforce-pipeline-freshness
